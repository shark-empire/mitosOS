name: kernel-boot-test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-none
            qemu_bin: qemu-system-aarch64
            qemu_flags: -M raspi3b -display none -serial stdio
            bin_name: kernel8.img

          - target: x86_64-unknown-none
            qemu_bin: qemu-system-x86_64
            # Boots disk.img via SeaBIOS — exercises the real
            # stage1 -> stage2 -> kernel handoff, not a shortcut load
            qemu_flags: -M pc -m 256M -no-reboot -display none -serial stdio
            bin_name: mitosos


    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-system-x86 gcc-aarch64-linux-gnu nasm

     - name: Setup Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none, aarch64-unknown-none
          components: llvm-tools-preview

      # --- ADDED: Create rootfs.tar before building ARM kernel ---
      - name: Create ramdisk (ARM only)
        if: matrix.target == 'aarch64-unknown-none'
        run: |
          echo "Hello from mitosOS in-memory filesystem!" > test.txt
          tar -cf rootfs.tar test.txt

      - name: Build kernel (ARM only)
        if: matrix.target == 'aarch64-unknown-none'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare boot image (ARM only)
        if: matrix.target == 'aarch64-unknown-none'
        run: |
          TOOLCHAIN_BIN=$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | grep host | cut -f2 -d' ')/bin
          export PATH=$PATH:$TOOLCHAIN_BIN
          rust-objcopy --strip-all -O binary target/${{ matrix.target }}/release/mitosos ${{ matrix.bin_name }}

      - name: Build bootloader + kernel + disk image (x86_64 only)
        if: matrix.target == 'x86_64-unknown-none'
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Boot in QEMU and check serial output
        run: |
          set -o pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-none" ]; then
            BOOT_ARGS="-kernel kernel8.img"
          else
            BOOT_ARGS="-drive format=raw,file=disk.img"
          fi

          timeout 20s ${{ matrix.qemu_bin }} ${{ matrix.qemu_flags }} $BOOT_ARGS 2>&1 | tee qemu_output.log || true

          echo "----- captured serial output -----"
          cat qemu_output.log
          grep -q "mitosOS: kernel_main reached. Boot OK." qemu_output.log
